<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ruskin — Map of Places</title>

    <!-- Leaflet + MarkerCluster -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- jQuery + CSV parser -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../_Map/GIS/ARCGIS%20Webmap%20Application/jquery.csv-0.71.js"></script>

    <!-- TimelineJS (Knight Lab) -->
    <link
      rel="stylesheet"
      href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css"
    />
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

    <style>
      #map {
        height: 640px;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      .controls {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1000;
        background: #fff;
        padding: 8px;
        border-radius: 4px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }
      .controls input[type='text'] {
        width: 220px;
      }
    </style>
  </head>

  <body>
    <h1 class="page-title" style="padding: 8px 16px; margin: 0">Ruskin — Map of Places</h1>

    <div id="map"></div>

    <div class="controls" id="map-controls" style="margin-top: 120px">
      <div>
        <input id="map-search" type="text" placeholder="Search place name..." />
        <button id="map-search-btn">Find</button>
      </div>
      <span id="hist-val"></span>
    </div>

    <div id="timeline-embed" style="height: 320px; margin: 12px"></div>

    <script>
      // -----------------------------
      // CONFIG
      // -----------------------------
      const GEOJSON_URL = encodeURI(
        '/_Map/GIS/ARCGIS Webmap Application/GeoJsonData/AllPoints.json',
      );

      const CSV_URL = '/_Map/GIS/CSV/places_mockup2.csv';

      // TEI-ish JSON exports (your existing paths)
      const PLACES_JSON_URL = '/_Map/Places/places.json';
      const MARY_PLACES_JSON_URL = '/_Map/Places/mary_places.json';
      const PLACES_VISITED_BY_MARY = '/_Map/Places/places_visited_by_mary.json';

      const SLUG_FIELD = 'slug';

      const STYLE = {
        geojson: {
          radius: 7,
          weight: 2,
          fillOpacity: 0.85,
          color: '#1f77b4',
          fillColor: '#1f77b4',
        },
        csv: { radius: 7, weight: 2, fillOpacity: 0.85, color: '#ff7f0e', fillColor: '#ff7f0e' },
        tei: { radius: 7, weight: 2, fillOpacity: 0.85, color: '#9467bd', fillColor: '#9467bd' },
        mary: { radius: 7, weight: 2, fillOpacity: 0.85, color: '#2ca02c', fillColor: '#2ca02c' },
      };

      // -----------------------------
      // MAP SETUP (ONLY ONCE)
      // -----------------------------
      const map = L.map('map').setView([50.5, 6.0], 5);

      const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors',
      }).addTo(map);

      const carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; CARTO',
      });

      const historical = L.tileLayer('/_Map/tiles/historical/{z}/{x}/{y}.png', {
        maxZoom: 18,
        attribution: 'Historical map (Ruskin era)',
      }).setOpacity(0.85);

      // Marker clusters
      const geoCluster = L.markerClusterGroup();
      const csvCluster = L.markerClusterGroup();
      const teiCluster = L.markerClusterGroup();
      const maryCluster = L.markerClusterGroup();

      // Path layer for Mary visited places
      const VisitedByMaryPathLayer = L.featureGroup();

      // Layer control
      const baseMaps = { OpenStreetMap: osm, 'Carto Light': carto };
      const overlayMaps = {
        'GeoJSON places': geoCluster,
        'CSV places': csvCluster,
        'TEI places.json': teiCluster,
        'Mary places.json': maryCluster,
        'Mary visited path': VisitedByMaryPathLayer,
        'Historical map': historical,
      };
      L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

      // Search index across ALL datasets
      const searchIndex = [];

      // -----------------------------
      // POPUP + UTILITIES
      // -----------------------------
      function makePopupHtml(name, props) {
        let html = '<div><strong>' + (name || 'Place') + '</strong>';

        const note = props && (props.place_note || props.note || props.description);
        if (note) html += '<div>' + note + '</div>';

        if (props && props[SLUG_FIELD]) {
          const slug = props[SLUG_FIELD];
          const url = String(slug).startsWith('/') ? slug : '/witnesses/' + slug;
          html += '<div><a href="' + url + '" target="_self">Open item</a></div>';
        } else {
          const place = encodeURIComponent(name || '');
          const url = '/search?placeName=' + place + '&placeNameType=all';
          html += '<div><a href="' + url + '" target="_self">Search related items</a></div>';
        }

        html += '</div>';
        return html;
      }

      function addToSearchIndex(title, layer, latlng) {
        if (!title || !latlng) return;
        searchIndex.push({ name: title, layer, latlng });
      }

      function parseGeo(geoVal) {
        if (!geoVal) return null;
        const s = String(geoVal).trim();
        const parts = s.split(/[,\s]+/).filter(Boolean);
        if (parts.length < 2) return null;
        const lat = parseFloat(parts[0]);
        const lon = parseFloat(parts[1]);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
        return [lat, lon];
      }

      function safeText(x) {
        if (x == null) return '';
        if (typeof x === 'string') return x;
        if (typeof x === 'object' && x['#text']) return String(x['#text']);
        return String(x);
      }

      function asArray(x) {
        return !x ? [] : Array.isArray(x) ? x : [x];
      }

      // -----------------------------
      // TIMELINE HELPERS
      // -----------------------------
      const _timelineEvents = [];

      function parseDateParts(s) {
        if (!s) return null;
        s = String(s).trim();

        // yyyy or yyyy-mm or yyyy-mm-dd
        const iso = s.match(/^(\d{4})(?:[-\/](\d{1,2})(?:[-\/](\d{1,2}))?)?$/);
        if (iso) return { year: iso[1], month: iso[2] || null, day: iso[3] || null };

        // "Mar 1879" etc
        const parts = s.split(/\s+/).map((p) => p.replace(/[.,]/g, '').toLowerCase());
        const months = {
          jan: 1,
          feb: 2,
          mar: 3,
          apr: 4,
          may: 5,
          jun: 6,
          jul: 7,
          aug: 8,
          sep: 9,
          oct: 10,
          nov: 11,
          dec: 12,
        };
        const yearTok = parts.find((p) => /^\d{4}$/.test(p));
        if (!yearTok) return null;

        const monTok = parts.find((p) => months[p.substring(0, 3)]);
        const dayTok = parts.find((p) => /^\d{1,2}$/.test(p));

        return {
          year: yearTok,
          month: monTok ? months[monTok.substring(0, 3)] : null,
          day: dayTok && dayTok !== yearTok ? dayTok : null,
        };
      }

      function pushTimelineEvent(title, props, latlng) {
        const dateStr =
          props &&
          (props.date || props.Date || props.year || props.date_visited || props.visit_date);
        if (!dateStr) return;

        const d = parseDateParts(dateStr);
        if (!d) return;

        const ev = {
          start_date: { year: String(d.year) },
          text: {
            headline: title || 'Place',
            text: (props && (props.description || props.note || props.place_note || '')) || '',
          },
          unique_id: _timelineEvents.length + 1,
          _map: latlng ? { lat: latlng.lat ?? latlng[0], lon: latlng.lng ?? latlng[1] } : null,
        };

        if (d.month) ev.start_date.month = String(d.month);
        if (d.day) ev.start_date.day = String(d.day);

        _timelineEvents.push(ev);
      }

      function pushTimelineEventsFromTeiPlace(title, placeObj, geoArr) {
        const events = asArray(placeObj?.event);
        events.forEach((ev) => {
          const when = ev?.['@when'];
          if (!when) return;

          const kind = ev?.['@type'] ? String(ev['@type']) : 'event';
          const label = ev?.label ? String(ev.label) : '';
          const note = placeObj?.note?.p ? safeText(placeObj.note.p) : '';

          pushTimelineEvent(
            title,
            { date: when, description: `${kind}: ${label}${note ? '\n' + note : ''}` },
            geoArr,
          );
        });
      }

      function buildAndAttachTimeline() {
        const el = document.getElementById('timeline-embed');
        if (!el) return;

        if (_timelineEvents.length === 0) {
          el.innerHTML = '<p style="padding:10px">No dated events found for timeline.</p>';
          return;
        }

        const timelineJson = {
          title: { text: { headline: 'Ruskin timeline', text: 'Places and dated visits' } },
          events: _timelineEvents,
        };

        window.ruskinTimeline = new TL.Timeline('timeline-embed', timelineJson, {
          initial_zoom: 2,
          language: 'en',
        });

        // Pan map when slide changes (best-effort)
        try {
          if (window.ruskinTimeline && window.ruskinTimeline.on) {
            window.ruskinTimeline.on('change', () => {
              const idx = window.ruskinTimeline.getCurrentSlideIndex
                ? window.ruskinTimeline.getCurrentSlideIndex()
                : null;
              if (idx == null) return;

              const ev = _timelineEvents[idx];
              if (ev && ev._map) map.setView([ev._map.lat, ev._map.lon], 10);
            });
          }
        } catch (e) {
          console.warn('timeline wiring failed', e);
        }
      }

      // -----------------------------
      // LOADERS
      // -----------------------------
      function loadGeoJsonLayer(url, cluster, style) {
        return fetch(url)
          .then((r) => {
            if (!r.ok) throw new Error('GeoJSON load failed: ' + r.status);
            return r.json();
          })
          .then((json) => {
            L.geoJSON(json, {
              pointToLayer: (_f, latlng) => L.circleMarker(latlng, style),
              onEachFeature: (feature, layer) => {
                const props = feature.properties || {};
                const title =
                  props.City_Names || props.name || props.place || props.City || 'Place';
                layer.bindPopup(makePopupHtml(title, props));
                cluster.addLayer(layer);
                addToSearchIndex(title, layer, layer.getLatLng());
                pushTimelineEvent(title, props, layer.getLatLng()); // only if geojson has date-ish fields
              },
            });
            map.addLayer(cluster);
          });
      }

      function loadCsvLayer(url, cluster, style) {
        return new Promise((resolve, reject) => {
          $.ajax({ url, dataType: 'text' })
            .done((csvText) => {
              try {
                const rows = $.csv.toObjects(csvText);
                rows.forEach((row) => {
                  const lat = parseFloat(
                    row.y_latitude || row.lat || row.latitude || row.Y || row.y,
                  );
                  const lon = parseFloat(
                    row.x_longitude || row.lon || row.longitude || row.X || row.x,
                  );
                  if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

                  const title =
                    row.place_name ||
                    row.place ||
                    row.City ||
                    row.City_Names ||
                    row.name ||
                    'Place';

                  const marker = L.circleMarker([lat, lon], style).bindPopup(
                    makePopupHtml(title, row),
                  );
                  cluster.addLayer(marker);

                  const latlng = marker.getLatLng();
                  addToSearchIndex(title, marker, latlng);
                  pushTimelineEvent(title, row, latlng);
                });

                map.addLayer(cluster);
                resolve();
              } catch (e) {
                reject(e);
              }
            })
            .fail((_xhr, _status, err) => reject(new Error('CSV load failed: ' + err)));
        });
      }

      // TEI-ish JSON structure: data.div.listPlace.place[]
      function loadTeiPlacesJsonLayer(url, cluster, style, opts = {}) {
        const { buildPath = false, pathLayer = null } = opts;

        return fetch(url)
          .then((r) => {
            if (!r.ok) throw new Error('TEI places load failed: ' + r.status);
            return r.json();
          })
          .then((data) => {
            const places = data?.div?.listPlace?.place || [];
            const pathLatLngs = [];

            places.forEach((p) => {
              const title =
                safeText(p.placeName) ||
                safeText(p.head) ||
                safeText(p['@xml:id']) ||
                safeText(p['@corresp']) ||
                'Place';

              const geo = parseGeo(p?.location?.geo);
              if (!geo) {
                // still allow timeline from events even if no geo
                pushTimelineEventsFromTeiPlace(title, p, null);
                return;
              }

              const latlng = L.latLng(geo[0], geo[1]);
              const props = {
                note: safeText(p?.note?.p),
                slug: p?.[SLUG_FIELD],
              };

              const marker = L.circleMarker(latlng, style).bindPopup(makePopupHtml(title, props));
              cluster.addLayer(marker);

              addToSearchIndex(title, marker, latlng);
              pushTimelineEventsFromTeiPlace(title, p, geo);

              if (buildPath) pathLatLngs.push(latlng);
            });

            map.addLayer(cluster);

            if (buildPath && pathLayer && pathLatLngs.length > 1) {
              const polyline = L.polyline(pathLatLngs, {
                color: 'blue',
                weight: 3,
                opacity: 0.7,
                dashArray: '5, 10',
              });
              pathLayer.addLayer(polyline);
              map.addLayer(pathLayer);
            }
          });
      }

      // This file seems focused on timeline events, may not contain geo reliably.
      function loadMaryVisitedPlacesTimeline(url) {
        return fetch(url)
          .then((r) => {
            if (!r.ok) throw new Error('Mary visited places load failed: ' + r.status);
            return r.json();
          })
          .then((json) => {
            const places = json?.div?.listPlace?.place || [];

            places.forEach((place) => {
              const title = safeText(place['@corresp'] || place.placeName || 'Place')
                .replace('#', '')
                .toLowerCase()
                .replace(/\b\w/g, (c) => c.toUpperCase());

              const note = safeText(place?.note?.p);
              const events = asArray(place?.event);

              events.forEach((ev) => {
                if (!ev?.['@when']) return;
                pushTimelineEvent(
                  title,
                  {
                    date: ev['@when'],
                    description:
                      `<strong>${safeText(ev['@type'] || 'event')}:</strong> ` +
                      `${safeText(ev.label || '')}` +
                      (note ? '<br/>' + note : ''),
                  },
                  null,
                );
              });
            });
          });
      }

      // -----------------------------
      // SEARCH UI
      // -----------------------------
      function findAndOpen(q) {
        q = (q || '').toLowerCase().trim();
        if (!q) return false;

        const found =
          searchIndex.find((s) => s.name && s.name.toLowerCase() === q) ||
          searchIndex.find((s) => s.name && s.name.toLowerCase().includes(q));

        if (found && found.latlng) {
          map.setView(found.latlng, Math.max(map.getZoom(), 8));
          if (found.layer && found.layer.openPopup) found.layer.openPopup();
          return true;
        }
        return false;
      }

      document.getElementById('map-search-btn').addEventListener('click', () => {
        const q = document.getElementById('map-search').value;
        if (!findAndOpen(q)) alert('No match — try broader terms.');
      });

      document.getElementById('map-search').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('map-search-btn').click();
        }
      });

      window.ruskinMap = { findAndOpen };

      // -----------------------------
      // LOAD EVERYTHING, THEN BUILD TIMELINE ONCE
      // -----------------------------
      Promise.all([
        loadGeoJsonLayer(GEOJSON_URL, geoCluster, STYLE.geojson),
        loadCsvLayer(CSV_URL, csvCluster, STYLE.csv),
        loadTeiPlacesJsonLayer(PLACES_JSON_URL, teiCluster, STYLE.tei),
        loadTeiPlacesJsonLayer(MARY_PLACES_JSON_URL, maryCluster, STYLE.mary, {
          buildPath: true,
          pathLayer: VisitedByMaryPathLayer,
        }),
        loadMaryVisitedPlacesTimeline(PLACES_VISITED_BY_MARY),
      ])
        .then(() => buildAndAttachTimeline())
        .catch((err) => {
          console.error(err);
          // best-effort timeline even if one source fails
          buildAndAttachTimeline();
        });
    </script>
  </body>
</html>
